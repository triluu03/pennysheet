[package]
name = "infra"
version = "0.1.0"
edition = "2024"

[dependencies]
domain = { version = "0.1.0", path = "../domain", features = ["sea-orm-support"] }
sea-orm = { version = "2.0.0-rc", features = [
	"sqlx-postgres",
	"runtime-tokio-rustls",
	"macros",
	"schema-sync",
	"entity-registry",
	"with-json",
	"with-uuid",
	"with-chrono"
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.2", features = ["v4"] }

[lints]
workspace = true
