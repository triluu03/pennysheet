[package]
name = "pennysheet-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.9"
sea-orm = { version = "2.0.0-rc", features = ["sqlx-postgres", "runtime-tokio-rustls", "macros", "mock", "schema-sync", "entity-registry"] }
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }

[lints.clippy]
empty_docs = "warn"
missing_errors_doc = "warn"
missing_panics_doc = "warn"
missing_safety_doc = "warn"
missing_docs_in_private_items = "warn"
