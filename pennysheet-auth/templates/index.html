<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Pennysheet — Choose Your Bank</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; }
        a { color: #2563eb; text-decoration: none; font-size: 1rem; }
        a:hover { text-decoration: underline; }
        .empty { color: #6b7280; font-style: italic; }
    </style>
</head>
<body>
    <h1>Available Banks</h1>
    {% if aspsps %}
    <ul>
        {% for aspsp in aspsps %}
        <li><a href="{{ url_for('auth_start', aspsp_name=aspsp.name) }}">{{ aspsp.name }}</a></li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="empty">No banks available.</p>
    {% endif %}
</body>
</html>
